name: 🐧 Linux Build

on:
  workflow_call:

jobs:
  linux-appimage:
    name: "Build"
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download version.h artifact
      uses: actions/download-artifact@v4
      with:
        name: version-file
        path: src/loader/

    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('**/install-packages.sh') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install Packages
      run: scripts/appimage/install-packages.sh

    - name: Pack ID Libs
      run: scripts/appimage/id-libs.sh

    - name: Install Kisak
      run: scripts/appimage/install-kisak.sh

    - name: Build Deps
      run: scripts/appimage/build-deps.sh

    - name: Compile Build for Linux
      shell: bash
      run: |
        make linux
        cd build-linux
        rm -rf CMakeFiles CMakeCache.txt cmake_install.cmake Makefile libminhook.a libxdiff.a
        cd ..
        tar -czvf linuxloader-linux.tar.gz -C ./build-linux .
        scripts/appimage/make-appimage.sh

    - name: Upload linuxloader-linux.tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: "linux-build" 
        path: "linuxloader-linux.tar.gz"

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: "linux-appimage"
        path: "linuxloader.AppImage"

